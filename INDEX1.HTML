<!DOCTYPE html>
<html>
<head>
    <title>Simple Expense Tracker</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
        }

        .container {
            width: 100%;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .box {
            width: 80%;
            max-width: 600px;
            background-color: white;
            padding: 20px;
            border-radius: 5px;
        }

        h2 {
            text-align: center;
        }

        label {
            display: block;
            margin-top: 15px;
        }

        input {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
        }

        button {
            width: 100%;
            padding: 10px;
            margin-top: 20px;
            background-color: #4CAF50;
            color: white;
            border: none;
            font-size: 16px;
        }

        .result {
            margin-top: 20px;
            padding: 10px;
            background-color: #e6e6e6;
        }
    </style>
</head>

<body>

<div class="container">
    <div class="box">
        <h2>Daily Expense Tracker</h2>

        <label>Total Amount You Have</label>
        <input type="number" id="total" placeholder="Example: 1000">

        <label>Amount Spent Today</label>
        <input type="number" id="spent" placeholder="Example: 300">

        <button onclick="calculate()">Calculate</button>

        <div class="result">
            <p>Total Amount : ₹ <span id="t">0</span></p>
            <p>Spent Amount : ₹ <span id="s">0</span></p>
            <p>Remaining for Next Day : ₹ <span id="r">0</span></p>
        </div>
    </div>
</div>

<script>
    function calculate() {
        var total = document.getElementById("total").value;
        var spent = document.getElementById("spent").value;

        var remaining = total - spent;

        document.getElementById("t").innerText = total;
        document.getElementById("s").innerText = spent;
        document.getElementById("r").innerText = remaining;
    }
</script>

</body>
</html>
